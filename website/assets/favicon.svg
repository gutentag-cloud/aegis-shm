  <!-- damaged, deflected beam -->
  <path d="M13 34 Q32 50 51 34" fill="none" stroke="url(#g)" stroke-width="4" stroke-linecap="round"/>
  <!-- damage hotspot -->
  <circle cx="32" cy="42" r="4.2" fill="#f47878"/>
