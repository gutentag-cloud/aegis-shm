<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Aegis">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4c45a"/>
      <stop offset="1" stop-color="#e0a93c"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0b1020"/>
  <!-- supports -->
  <path d="M10 44 L16 34 L22 44 Z" fill="#5aa6f4"/>
  <path d="M42 44 L48 34 L54 44 Z" fill="#5aa6f4"/>
  <!-- healthy beam (faint) -->
